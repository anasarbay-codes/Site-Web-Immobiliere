<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maysanne Bouskoura | Détails</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* CSS Spécifique pour cette page interne */
    .detail-hero {
        height: 100vh;
        background: url('images/residance.jpg') no-repeat center center/cover; /* Remplacez par votre photo de chantier */
        position: relative;
        display: flex;
        align-items: flex-end; /* Texte en bas */
        padding-bottom: 80px;
    }
    .detail-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(10,25,47, 0.9), transparent);
    }
    .legend-box {
        position: relative;
        z-index: 2;
        max-width: 800px;
        margin: 0 auto;
        text-align: center;
        color: white;
        border-left: 5px solid var(--gold);
        padding-left: 30px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 0 20px 20px 0;
    }
    .legend-box h1 { color: var(--gold); font-size: 3rem; margin-bottom: 10px; }
    .legend-box p { font-size: 1.2rem; letter-spacing: 1px; }
    .back-btn {
        position: fixed; top: 30px; left: 30px; z-index: 100;
        color: white; font-weight: bold; display: flex; align-items: center; gap: 10px;
    }
    .back-btn:hover { color: var(--gold); }
  </style>
</head>
<body>

  <a href="immo.html" class="back-btn">← Retour à l'accueil</a>

  <section class="detail-hero">
    <div class="detail-overlay"></div>
    
    <div class="container">
      <div class="legend-box">
        <h1>Maysanne Bouskoura</h1>
        <p>CHANTIER EN COURS — LIVRAISON 2025</p>
        <p style="font-size: 0.9rem; margin-top: 15px; opacity: 0.8;">
          Une immersion au cœur de l'avancement de notre résidence premium. 
          L'alliance du béton et de la nature prend forme.
        </p>
      </div>
    </div>
  </section>

</body>
</html>
